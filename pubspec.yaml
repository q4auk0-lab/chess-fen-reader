name: chess_fen_reader
description: Chess screen reader - captures any chess app and outputs FEN + Stockfish analysis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Image processing
  image: ^4.1.7

  # Stockfish chess engine
  stockfish: ^1.8.1

  # UI
  provider: ^6.1.2

  # Utilities
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
