name: chess_fen_reader
description: Chess screen reader - captures any chess app and outputs FEN + Stockfish analysis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Screen capture
  flutter_screen_capture: ^0.0.3

  # Image processing & ML
  google_mlkit_text_recognition: ^0.11.0
  image: ^4.1.7

  # Stockfish chess engine
  stockfish_chess_engine: ^2.2.0

  # UI & Overlay
  flutter_overlay_window: ^0.4.3
  provider: ^6.1.2

  # Utilities
  clipboard: ^0.1.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pieces/
    - assets/apps/
